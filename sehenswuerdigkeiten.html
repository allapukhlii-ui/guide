<!DOCTYPE html>
<html lang="de">

  <meta charset="UTF-8">
  <title>Sehenswürdigkeiten - Marseille</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar">
    <a href="index.html">Home</a>
